<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Velora TV</title>
    <style>
        body { margin: 0; padding: 0; background-color: #0b0f19; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255, 255, 255, 0.1); border-top-color: #2563eb; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script>
        // Redirect to the hosted application
        window.location.replace("https://veloratv.in");
    </script>
</head>
<body>
    <div class="spinner"></div>
</body>
</html>
